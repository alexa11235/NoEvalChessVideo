<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player's Camera Without Eval</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <h2>Candidates 2026</h2>
            
            <div class="load-menu">
                <select id="roundSelect">
                    <option value="" disabled selected hidden>Load games...</option>
                </select>
            </div>
        
            <ul id="gameList"></ul>
        
            <div class="add-form" style="margin-top: auto; padding-top: 20px;">
                <input type="text" id="gameName" placeholder="Name (e.g. Caruana - Naka)">
                <input type="text" id="gameUrl" placeholder="YouTube Link">
                <button id="addBtn">Add Game</button>
            </div>
        </div>

        <div class="main-content">
            <div class="video-wrapper" id="videoContainer">
                
                <button id="customFsBtn" class="custom-fs-btn" title="Toggle Fullscreen">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 15l6 6M15 21h6v-6M9 3H3v6M3 3l7 7"/>
                    </svg>
                </button>

                <div class="eval-mask"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
